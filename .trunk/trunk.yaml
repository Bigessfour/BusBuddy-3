# 🚌 Trunk config for BusBuddy: .NET 9 WPF, PowerShell 7.5.2, Azure SQL
# Centralizes linting/formatting for consistent code quality across the project
#
# ✨ WINDOWS COMPATIBILITY FIXES:
# - shellcheck@0.10.0: Updated from 0.11.0 for Windows compatibility
# - Added Windows-specific environment variables and exclusions
# - PowerShell tools use system PowerShell 7.5.2 (not managed by Trunk runtimes)
# - Added shell script formatting options for Windows
#
# ✨ WHITESPACE ENFORCEMENT:
# - dotnet-format: Automatically trims trailing whitespace in C# files
# - XamlStyler: Configured via Settings.XamlStyler to remove trailing whitespace
# - Prettier: Handles JSON/YAML formatting with consistent whitespace
# - trunk.formatOnSave: true in .vscode/settings.json ensures format-on-save
# - trunk-fmt-pre-commit: Prevents whitespace from entering version control
# - CI Integration: Run "trunk check --all" in bb-quality-check for enforcement
#
# 🔐 GITHUB ACTIONS SECRETS HANDLING:
# - Actionlint configured to handle graceful secret degradation patterns
# - Follows GitHub documentation for fork-safe secret handling
# - Supports conditional secret availability (fork PRs vs main repo)
# - Reference: https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#secrets-context
#
# Reference: https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0

# Trunk plugins for extended functionality
plugins:
  sources:
    - id: trunk
      ref: v1.7.2
      uri: https://github.com/trunk-io/plugins

# Runtime versions matching BusBuddy project standards
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0 # For Prettier and other JS-based tools
    - python@3.10.8 # For SQLFluff and other Python-based tools

# Core linting and formatting configuration
lint:
  definitions:
    # Override dotnet-format to use system .NET SDK
    - name: dotnet-format
      environment:
        - name: DOTNET_ROOT
          value: "C:\\Program Files\\dotnet"
        - name: DOTNET_CLI_TELEMETRY_OPTOUT
          value: "1"
    # Override actionlint to handle GitHub Actions secrets gracefully
    - name: actionlint
      environment:
        - name: ACTIONLINT_IGNORE_UNTRUSTED_INPUT
          value: "1"
      run_when: [ci, cli]
      commands:
        - output: sarif
          success_codes: [0, 1] # Allow warnings for secret context issues
          formatter: true
    # Override shfmt for Windows compatibility
    - name: shfmt
      environment:
        - name: SHFMT_OPTS
          value: "-i 4 -ci" # 4-space indentation, consistent indentation
      run_when: [ci, cli]
      commands:
        - name: check
          run: shfmt -d $PATH
          output: sarif
          success_codes: [0, 1]
          formatter: true
        - name: format
          run: shfmt -w $PATH
          output: sarif
          success_codes: [0]
          formatter: true
    # Override roslynator for .NET projects
    - name: roslynator
      environment:
        - name: DOTNET_ROOT
          value: "C:\\Program Files\\dotnet"
        - name: ROSLYNATOR_CONFIG
          value: ".roslynator.config"
      run_when: [ci, cli]
      commands:
        - name: check
          run: roslynator analyze $PATH --output $OUTPUT --format sarif
          output: sarif
          success_codes: [0, 1]
          formatter: true
    # Override stylecop for .NET projects
    - name: stylecop
      environment:
        - name: DOTNET_ROOT
          value: "C:\\Program Files\\dotnet"
      run_when: [ci, cli]
      commands:
        - name: check
          run: stylecop $PATH --output $OUTPUT --format sarif
          output: sarif
          success_codes: [0, 1]
          formatter: true
    # Override security-code-scan for .NET security
    - name: security-code-scan
      environment:
        - name: DOTNET_ROOT
          value: "C:\\Program Files\\dotnet"
      run_when: [ci, cli]
      commands:
        - name: check
          run: security-code-scan $PATH --output $OUTPUT --format sarif
          output: sarif
          success_codes: [0, 1]
          formatter: true
  disabled:
    - markdownlint # Using custom markdown formatting
    # cspell enabled for XAML/code comments - removed from disabled list
  enabled:
    # Security and infrastructure scanning
    - taplo@0.10.0
    - actionlint@1.7.7
    - bandit@1.8.6
    - black@25.1.0
    - isort@6.0.1
    - ruff@0.12.10
    - shellcheck@0.10.0
    - shfmt@3.6.0
    - sqlfluff@3.4.2
    - cspell@9.2.0 # Spell checking for XAML comments and documentation
    # codespell@2.4.1 # DISABLED - using Trunk CSpell only for consistency
    - dotnet-format@7.0.400 # Trims whitespace in C# by default (Trunk-supported version)
    - checkov@3.2.467 # Infrastructure as code security
    - git-diff-check # Git hygiene
    - osv-scanner@2.2.2 # Vulnerability scanning
    - trufflehog@3.90.5 # Secret detection

    # Code formatting and quality
    - prettier@3.6.2 # JSON, YAML formatting
    - yamllint@1.37.1 # YAML linting

    # PowerShell linting and formatting
    - psscriptanalyzer@1.24.0 # PowerShell best practices

    # Additional .NET tools
    - roslynator # Advanced C# code analysis and refactoring
    - stylecop # C# style and consistency checking
    - security-code-scan # .NET security vulnerability scanner
    - gitleaks@8.18.0 # Additional secret detection

    # Infrastructure and container tools
    - hadolint@2.12.0 # Dockerfile linting
    - terraform@1.9.5 # Infrastructure as code validation
    - tflint@0.53.0 # Terraform linting
    - tfsec@1.28.4 # Terraform security scanner

  # File path ignores for build artifacts and logs
  ignore:
    # Disable codespell - using Trunk CSpell only for consistency
    - linters: [codespell]
      paths:
        - "**/*"
    - linters: [roslynator]
      paths:
        - "**/*.vb" # Roslynator is C# specific
        - "**/*.fs" # Roslynator is C# specific
    - linters: [stylecop]
      paths:
        - "**/*.vb" # StyleCop is C# specific
        - "**/*.fs" # StyleCop is C# specific
    - linters: [security-code-scan]
      paths:
        - "**/*.vb" # Security Code Scan is C# specific
        - "**/*.fs" # Security Code Scan is C# specific
    - linters: [bandit]
      paths:
        - "**/*" # Python security scanner - only run on Python files
    - linters: [ruff]
      paths:
        - "**/*" # Python linter - only run on Python files
    - linters: [shellcheck]
      paths:
        - "**/*" # Shell script linter - only run on shell scripts
    - linters: [hadolint]
      paths:
        - "**/*" # Dockerfile linter - only run on Dockerfiles
    - linters: [terraform]
      paths:
        - "**/*" # Terraform validation - only run on .tf files
    - linters: [tflint]
      paths:
        - "**/*" # Terraform linting - only run on .tf files
    - linters: [tfsec]
      paths:
        - "**/*" # Terraform security - only run on .tf files
    - linters: [ALL]
      paths:
        - "**/*.disabled" # Disabled files for clean builds
        - "**/bin/**" # Build outputs
        - "**/obj/**" # Build intermediates
        - "**/TestResults/**" # Test outputs
        - "**/logs/**" # Log files
        - "**/artifacts/**" # Build artifacts
        - "**/Migrations/**" # EF auto-generated migrations
        - "**/.trunk/logs/**" # Trunk internal logs
        - "**/.trunk/out/**" # Trunk output files
        - "**/.trunk/tools/**" # Trunk tool cache
        - "**/node_modules/**" # Node.js dependencies
        - "**/packages/**" # NuGet package cache
        - "**/*.user" # User-specific files
        - "**/*.suo" # Solution user options
        - "**/.vs/**" # Visual Studio settings
        - "**/TestResults/**" # Test results
        - "**/*.tmp" # Temporary files
        - "**/*.log" # Log files
        - "**/BusBuddy.db*" # SQLite database files
        - "**/appsettings.*.json" # Environment-specific settings
    - linters: [git-diff-check]
      paths:
        - ".vscode/settings.json" # VS Code settings have different formatting standards
        - ".vscode/tasks.json" # VS Code tasks have different formatting standards
        - ".env" # Environment variables file
        - "**/*.md" # Markdown files may have different standards
    # GitHub Actions secrets handling - allow context warnings per GitHub docs
    # (Removed unsupported 'where' filter for actionlint; if filtering needed, migrate to tool-supported suppression mechanism.)

# ------------------------------------------------------------------
# Project spell-check dictionary (cspell) — configured in .cspell.json
# Reference (cspell config): https://github.com/streetsidesoftware/cspell
# ------------------------------------------------------------------

# Actions and hooks configuration for BusBuddy production workflow
actions:
  disabled:
    - git-lfs # Not using Git LFS
    - trunk-announce # Reduce noise
  enabled:
    - trunk-upgrade-available # Version update notifications
    - trunk-fmt-pre-commit # Auto-format on commit (includes whitespace trimming)
    - trunk-check-pre-push # Check quality before push

# BusBuddy-specific configuration
tools:
  enabled:
    - converttosarif@1.0.0
