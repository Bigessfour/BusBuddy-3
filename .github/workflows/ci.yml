---
# 🚌 BusBuddy CI/CD Pipeline - .NET 9 Optimized Edition
# 🎉 MAJOR UPGRADE: Complete .NET 8→9 Migration with Enhanced Package Stack
# ✨ LATEST ACHIEVEMENTS (August 25, 2025):
# 🔥 Migrated from multi-targeting to pure .NET 9.0 single-target
# 🔐 Updated Microsoft.Data.SqlClient 5.2.1 → 6.1.1 (Azure SQL performance boost)
# 🛡️ Updated Microsoft.Identity.Client 4.74.1 → 4.76.0 (enhanced security)
# 🗺️ Updated NetTopologySuite 2.5.0 → 2.6.0 (improved geospatial features)
# ⚡ Optimized AutoMapper stack (12.0.1) for zero dependency warnings
# 🧹 Eliminated ALL package version conflicts and build warnings
# 🎯 Trunk CLI compatibility resolved with .NET SDK 9.0.304

name: "🚌 BusBuddy .NET 9 Excellence Pipeline"

concurrency:
  group: busbuddy-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "**/*.md"
      - docs/**
      - Documentation/**
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
      - docs/**
      - Documentation/**
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: "Enable debug mode for troubleshooting"
        default: false

env:
  # 🚀 .NET 9 Excellence Configuration
  DOTNET_VERSION: "9.0.x"
  SOLUTION_FILE: "BusBuddy.sln"
  BUILD_CONFIGURATION: "Release"

  # 🎯 Updated Package Versions (Latest as of Aug 25, 2025)
  # Microsoft.Data.SqlClient: 6.1.1 (Azure SQL optimized)
  # Microsoft.Identity.Client: 4.76.0 (enhanced security)
  # NetTopologySuite: 2.6.0 (improved geospatial)
  # AutoMapper: 12.0.1 (dependency-optimized)

  # 🔧 BusBuddy Environment Controls
  BUSBUDDY_NO_WELCOME: "1"
  BUSBUDDY_NO_XAI_WARN: "1"
  BUSBUDDY_SILENT: "1"

jobs:
  validate-dependencies:
    name: "Validate Dependencies & Licenses"
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: "Detect Syncfusion License"
        shell: pwsh
        run: |
          if ($env:SYNCFUSION_LICENSE_KEY) { Write-Output "Syncfusion license detected in environment." } else { Write-Warning "SYNCFUSION license not present (secret not mapped)." }
      - name: "Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "Check Syncfusion License Configuration"
        run: |
          echo "Checking Syncfusion license configuration..."
          if (-not $env:SYNCFUSION_LICENSE_KEY) {
            Write-Output "SYNCFUSION_LICENSE_KEY secret is not configured"
            Write-Output "::warning::Syncfusion license key is missing. Add SYNCFUSION_LICENSE_KEY to repository secrets."
            exit 1
          }
        shell: pwsh

      - name: "Restore Dependencies"
        run: |
          echo "Restoring NuGet packages..."
          dotnet restore ${{ env.SOLUTION_FILE }} --verbosity normal

      - name: "Dependency Security Audit"
        run: |
          try { dotnet list package --vulnerable --include-transitive } catch { Write-Warning "Vulnerability check skipped" }
          try { dotnet list package --deprecated } catch { Write-Warning "Deprecated check skipped" }
        shell: pwsh

  build-and-test:
    name: "Build & Test"
    runs-on: windows-latest
    needs: validate-dependencies
    timeout-minutes: 30
    outputs:
      build-success: ${{ steps.build-step.outcome == 'success' }}
    steps:
      - name: "Detect Syncfusion License"
        shell: pwsh
        run: |
          if ($env:SYNCFUSION_LICENSE_KEY) { Write-Output "Syncfusion license detected in environment." } else { Write-Warning "SYNCFUSION license not present (secret not mapped)." }

      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "Cache NuGet packages"
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: "Install PowerShell Modules"
        shell: pwsh
        run: |
          $modules = @('PSScriptAnalyzer','Pester','Az.Accounts','Az.Sql','Az.Resources','SqlServer')
          foreach ($m in $modules) {
            try { Install-Module -Name $m -Scope CurrentUser -Force -AllowClobber -ErrorAction Stop } catch { Write-Warning "Failed installing $m" }
          }

      - name: "Configure Syncfusion License"
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrEmpty("$env:SYNCFUSION_LICENSE_KEY")) {
            Write-Output "SYNCFUSION_LICENSE_KEY=$env:SYNCFUSION_LICENSE_KEY" >> $env:GITHUB_ENV
          } else {
            Write-Warning "Syncfusion license key is not configured"
          }

      - name: "Load PowerShell Profile & List bb-* Commands"
        shell: pwsh
        run: |
          $profilePath = Join-Path $PWD 'PowerShell/Profiles/Microsoft.PowerShell_profile_optimized.ps1'
          if (Test-Path $profilePath) {
            . $profilePath
            Write-Host "Loaded BusBuddy profile." -ForegroundColor Cyan
            Get-Command bb-* -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name | ForEach-Object { Write-Host "Available: $_" }
          } else {
            Write-Host "Profile not found: $profilePath (proceeding without bb-* shortcuts)" -ForegroundColor Yellow
          }

      - name: "Quality Validation (Anti-Regression & XAML)"
        shell: pwsh
        run: |
          $ran = $false
          if (Get-Command bb-anti-regression -ErrorAction SilentlyContinue) { bb-anti-regression; $ran = $true }
          if (Get-Command bb-xaml-validate -ErrorAction SilentlyContinue) { bb-xaml-validate; $ran = $true }
          if (-not $ran) { Write-Host "bb-* validation commands not available; skipping" -ForegroundColor Yellow }

      - name: "Restore Dependencies"
        run: dotnet restore ${{ env.SOLUTION_FILE }} --verbosity minimal

      - id: build-step
        name: "Build Solution"
        shell: pwsh
        run: |
          if (Get-Command bb-build -ErrorAction SilentlyContinue) {
            Write-Host "Using bb-build" -ForegroundColor Cyan
            bb-build
          } else {
            dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore --verbosity minimal /p:TreatWarningsAsErrors=false /p:WarningLevel=1
          }

      - name: "Run Tests"
        shell: pwsh
        run: |
          if (Get-Command bb-test -ErrorAction SilentlyContinue) {
            Write-Host "Using bb-test" -ForegroundColor Cyan
            bb-test
          } else {
            dotnet test ${{ env.SOLUTION_FILE }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults
          }

      - name: "Upload Test Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
          retention-days: 7

  quality-analysis:
    name: "Quality Analysis & Coverage"
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20
    steps:
      - name: "Detect Syncfusion License"
        shell: pwsh
        run: |
          if ($env:SYNCFUSION_LICENSE_KEY) { Write-Output "Syncfusion license detected in environment." } else { Write-Warning "SYNCFUSION license not present (secret not mapped)." }
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "Export Syncfusion license to env"
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrEmpty($env:SYNCFUSION_LICENSE_KEY)) { Write-Output "SYNCFUSION_LICENSE_KEY=$env:SYNCFUSION_LICENSE_KEY" >> $env:GITHUB_ENV }

      - name: "Run Tests with Coverage"
        shell: pwsh
        run: |
          dotnet test ${{ env.SOLUTION_FILE }} --configuration ${{ env.BUILD_CONFIGURATION }} --verbosity normal --logger "trx;LogFileName=quality-test-results.trx" --collect:"XPlat Code Coverage" --results-directory ./QualityTestResults

      - name: "Analyze Code Coverage"
        shell: pwsh
        run: |
          $coverageFiles = Get-ChildItem -Recurse -Path "./QualityTestResults" -Filter "coverage.cobertura.xml" -ErrorAction SilentlyContinue
          if ($coverageFiles) {
            $content = Get-Content $coverageFiles[0].FullName -Raw
            if ($content -match 'line-rate="([0-9.]+)"') {
              $coverage = [math]::Round([double]$matches[1] * 100, 2)
              Write-Output "Code coverage: $coverage%"
              if ($coverage -lt 80) { Write-Error "Coverage below threshold"; exit 1 }
            }
          }

      - name: "Run Trunk Check"
        run: |
          if ! command -v trunk &> /dev/null; then curl https://get.trunk.io -fsSL | bash; fi
          trunk check --all --ci --output-format=sarif --output-file=trunk-results.sarif || true

      - name: "Upload SARIF Results"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trunk-results.sarif
          category: trunk-analysis

  security-analysis:
    name: "Security Analysis"
    runs-on: windows-latest
    needs: validate-dependencies
    timeout-minutes: 15
    steps:
      - name: "Detect Syncfusion License"
        shell: pwsh
        run: |
          if ($env:SYNCFUSION_LICENSE_KEY) { Write-Output "Syncfusion license detected in environment." } else { Write-Warning "Syncfusion license not present (secret not mapped)." }
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Export Syncfusion license to env"
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrEmpty($env:SYNCFUSION_LICENSE_KEY)) { Write-Output "SYNCFUSION_LICENSE_KEY=$env:SYNCFUSION_LICENSE_KEY" >> $env:GITHUB_ENV }

      - name: "Init CodeQL"
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: "Build for Analysis"
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release

      - name: "Perform CodeQL Analysis"
        uses: github/codeql-action/analyze@v3

  deployment-readiness:
    name: "Deployment Readiness"
    runs-on: windows-latest
    needs: [build-and-test, security-analysis, quality-analysis]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    timeout-minutes: 10
    steps:
      - name: "Detect Syncfusion License"
        shell: pwsh
        run: |
          if ($env:SYNCFUSION_LICENSE_KEY) { Write-Output "Syncfusion license detected in environment." } else { Write-Warning "Syncfusion license not present (secret not mapped)." }
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "Export Syncfusion license to env"
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:SYNCFUSION_LICENSE_KEY)) { Write-Error "Syncfusion license required"; exit 1 }
          Write-Output "SYNCFUSION_LICENSE_KEY=$env:SYNCFUSION_LICENSE_KEY" >> $env:GITHUB_ENV

      - name: "Create Release Build"
        shell: pwsh
        run: |
          dotnet publish ./BusBuddy.WPF/BusBuddy.WPF.csproj --configuration Release --runtime win-x64 --self-contained true --output ./publish /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true

      - name: "Upload Deployment Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ./publish
          retention-days: 30

  notify-completion:
    name: "Notify Completion"
    runs-on: ubuntu-latest
    needs:
      [
        build-and-test,
        security-analysis,
        quality-analysis,
        deployment-readiness,
      ]
    if: ${{ needs.build-and-test.outputs.build-success == 'true' }}
    steps:
      - name: "Pipeline Summary"
        run: |
          echo "BusBuddy CI Pipeline Completed"
          echo "Build Status: ${{ needs.build-and-test.result }}"
          echo "Security Analysis: ${{ needs.security-analysis.result }}"
          echo "Quality Analysis: ${{ needs.quality-analysis.result }}"
          echo "Deployment Ready: ${{ needs.deployment-readiness.result }}"
          echo "Timestamp: $(date)"
