name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "Documentation/**"
      - "Archive/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "Documentation/**"
      - "Archive/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"
  SOLUTION_FILE: "BusBuddy.sln"
  BUILD_CONFIGURATION: "Release"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }} -p:EnableWindowsTargeting=true --verbosity minimal

      - name: Dependency audit (informational)
        run: |
          dotnet list package --vulnerable --include-transitive || true
          dotnet list package --deprecated || true
        shell: bash

      - name: Build
        run: >
          dotnet build ${{ env.SOLUTION_FILE }}
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --no-restore
          --verbosity minimal
          -p:EnableWindowsTargeting=true
          /p:TreatWarningsAsErrors=false
          /p:WarningLevel=1

      - name: Test
        run: >
          dotnet test ${{ env.SOLUTION_FILE }}
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --filter "Category!=Integration&Category!=InMemoryFlaky&(FullyQualifiedName~Core|Seed|Student|Route|Maintenance|PdfReport|Fleet|Gaps|ModelValidation)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
          retention-days: 7

  security:
    name: Security (CodeQL)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Build for analysis
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release -p:EnableWindowsTargeting=true

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  release-artifacts:
    name: Release artifacts
    runs-on: windows-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish WPF (win-x64)
        shell: pwsh
        run: >
          dotnet publish ./BusBuddy.WPF/BusBuddy.WPF.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ./publish
          retention-days: 30
