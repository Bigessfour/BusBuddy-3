---
# 🚌 BusBuddy CI/CD Pipeline - Enhanced Reliability Edition
# ✨ IMPROVEMENTS: Robust error handling, flexible file paths, better secret management
name: "🚌 BusBuddy Enhanced Reliability Pipeline"

concurrency:
  group: busbuddy-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master, develop, feature/*]
    paths-ignore:
      - "**/*.md"
      - docs/**
      - Documentation/**
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - "**/*.md"
      - docs/**
      - Documentation/**
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: "Enable debug mode for troubleshooting"
        default: false
      coverage_threshold:
        type: number
        description: "Code coverage threshold (default: 70%)"
        default: 70

permissions:
  contents: read
  security-events: write
  actions: read

env:
  # 🚀 Flexible .NET Configuration
  DOTNET_VERSION: "9.0.x"
  BUILD_CONFIGURATION: "Release"
  # 🔧 BusBuddy Environment Controls
  BUSBUDDY_NO_WELCOME: "1"
  BUSBUDDY_NO_XAI_WARN: "1"
  BUSBUDDY_SILENT: "1"
  # 📊 Pipeline Configuration
  COVERAGE_THRESHOLD: ${{ github.event.inputs.coverage_threshold || 70 }}
  DEBUG_MODE: ${{ github.event.inputs.debug_enabled || false }}

jobs:
  # 🔍 Pre-flight validation with early failure detection
  validate-environment:
    name: "🔍 Environment Validation"
    runs-on: windows-latest
    timeout-minutes: 5
    outputs:
      solution-file: ${{ steps.discover.outputs.solution-file }}
      project-file: ${{ steps.discover.outputs.project-file }}
      has-syncfusion-license: ${{ steps.secrets.outputs.has-syncfusion-license }}
      has-packages-lock: ${{ steps.discover.outputs.has-packages-lock }}
    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🔍 Discover Project Structure"
        id: discover
        shell: pwsh
        run: |
          # Discover solution file
          $solutionFiles = Get-ChildItem -Filter "*.sln" -File
          if ($solutionFiles.Count -eq 0) {
            Write-Error "❌ No solution file found"
            exit 1
          } elseif ($solutionFiles.Count -gt 1) {
            Write-Warning "⚠️ Multiple solution files found, using first: $($solutionFiles[0].Name)"
          }
          $solutionFile = $solutionFiles[0].Name
          Write-Output "solution-file=$solutionFile" >> $env:GITHUB_OUTPUT
          Write-Host "✅ Solution file: $solutionFile" -ForegroundColor Green

          # Discover main project file
          $projectFiles = Get-ChildItem -Recurse -Filter "*.WPF.csproj" -File
          if ($projectFiles.Count -eq 0) {
            $projectFiles = Get-ChildItem -Recurse -Filter "*WPF*.csproj" -File
          }
          if ($projectFiles.Count -gt 0) {
            $projectFile = $projectFiles[0].FullName.Replace("$PWD\", "").Replace("\", "/")
            Write-Output "project-file=$projectFile" >> $env:GITHUB_OUTPUT
            Write-Host "✅ Project file: $projectFile" -ForegroundColor Green
          } else {
            Write-Warning "⚠️ No WPF project file found"
          }

          # Check for packages.lock.json
          $lockFiles = Get-ChildItem -Recurse -Filter "packages.lock.json" -File
          $hasLock = $lockFiles.Count -gt 0
          Write-Output "has-packages-lock=$hasLock" >> $env:GITHUB_OUTPUT
          Write-Host "📦 Packages lock files: $($lockFiles.Count)" -ForegroundColor Cyan

      - name: "🔐 Check Required Secrets"
        id: secrets
        shell: pwsh
        run: |
          # Check Syncfusion license availability
          $hasSyncfusion = -not [string]::IsNullOrEmpty("$env:SYNCFUSION_LICENSE_KEY")
          Write-Output "has-syncfusion-license=$hasSyncfusion" >> $env:GITHUB_OUTPUT

          if ($hasSyncfusion) {
            Write-Host "✅ Syncfusion license available" -ForegroundColor Green
          } else {
            Write-Host "⚠️ Syncfusion license not available (may be fork PR)" -ForegroundColor Yellow
            Write-Host "::warning::Syncfusion features may be limited without license"
          }
        env:
          SYNCFUSION_LICENSE_KEY: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

      - name: "🏗️ Validate .NET SDK"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "📋 Environment Summary"
        shell: pwsh
        run: |
          Write-Host "🚌 BusBuddy CI/CD Environment Summary" -ForegroundColor Cyan
          Write-Host "Solution: ${{ steps.discover.outputs.solution-file }}" -ForegroundColor Green
          Write-Host "Project: ${{ steps.discover.outputs.project-file }}" -ForegroundColor Green
          Write-Host "Syncfusion License: ${{ steps.secrets.outputs.has-syncfusion-license }}" -ForegroundColor Green
          Write-Host "Coverage Threshold: ${{ env.COVERAGE_THRESHOLD }}%" -ForegroundColor Green
          Write-Host "Debug Mode: ${{ env.DEBUG_MODE }}" -ForegroundColor Green

  # 🔧 Dependency validation with enhanced error handling
  validate-dependencies:
    name: "🔧 Dependencies & Security"
    runs-on: windows-latest
    needs: validate-environment
    timeout-minutes: 15
    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🏗️ Setup .NET"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "📦 Smart Cache Strategy"
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/tools
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj', '**/global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
            ${{ runner.os }}-nuget-

      - name: "🔄 Robust Package Restore"
        shell: pwsh
        run: |
          $maxAttempts = 3
          $solution = "${{ needs.validate-environment.outputs.solution-file }}"

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "🔄 Restore attempt $attempt of $maxAttempts" -ForegroundColor Cyan
            try {
              # Clear local caches on retry
              if ($attempt -gt 1) {
                dotnet nuget locals all --clear
                Start-Sleep -Seconds 3
              }
              
              dotnet restore $solution --verbosity normal --force --no-cache
              Write-Host "✅ Package restore successful" -ForegroundColor Green
              break
            } catch {
              Write-Host "❌ Restore attempt $attempt failed: $_" -ForegroundColor Red
              if ($attempt -eq $maxAttempts) {
                Write-Error "All restore attempts failed"
                exit 1
              }
              Start-Sleep -Seconds 5
            }
          }

      - name: "🛡️ Security Audit"
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "🔍 Running security audit..." -ForegroundColor Cyan

          # Check for vulnerable packages
          try {
            $vulnerableOutput = dotnet list package --vulnerable --include-transitive 2>&1
            if ($vulnerableOutput -match "has the following vulnerable packages") {
              Write-Host "⚠️ Vulnerable packages detected:" -ForegroundColor Yellow
              Write-Host $vulnerableOutput
              Write-Host "::warning::Vulnerable dependencies found - review required"
            } else {
              Write-Host "✅ No vulnerable packages detected" -ForegroundColor Green
            }
          } catch {
            Write-Host "⚠️ Vulnerability check skipped: $_" -ForegroundColor Yellow
          }

          # Check for deprecated packages
          try {
            $deprecatedOutput = dotnet list package --deprecated 2>&1
            if ($deprecatedOutput -match "deprecated") {
              Write-Host "⚠️ Deprecated packages detected:" -ForegroundColor Yellow
              Write-Host $deprecatedOutput
              Write-Host "::warning::Deprecated dependencies found - consider updating"
            } else {
              Write-Host "✅ No deprecated packages detected" -ForegroundColor Green
            }
          } catch {
            Write-Host "⚠️ Deprecated check skipped: $_" -ForegroundColor Yellow
          }

  # 🏗️ Build and test with enhanced reliability
  build-and-test:
    name: "🏗️ Build & Test"
    runs-on: windows-latest
    needs: [validate-environment, validate-dependencies]
    timeout-minutes: 40
    outputs:
      build-success: ${{ steps.build.outcome == 'success' }}
      test-success: ${{ steps.test.outcome == 'success' }}
    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🏗️ Setup .NET"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "📦 Restore Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/tools
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj', '**/global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: "🔧 Install Essential Tools"
        shell: pwsh
        continue-on-error: true
        run: |
          $essentialModules = @(
            @{Name='PSScriptAnalyzer'; Required=$false},
            @{Name='Pester'; Required=$false},
            @{Name='SqlServer'; Required=$false}
          )

          foreach ($module in $essentialModules) {
            try {
              Write-Host "📦 Installing $($module.Name)..." -ForegroundColor Cyan
              Install-Module -Name $module.Name -Scope CurrentUser -Force -AllowClobber -SkipPublisherCheck -ErrorAction Stop
              Write-Host "✅ $($module.Name) installed" -ForegroundColor Green
            } catch {
              if ($module.Required) {
                Write-Error "❌ Failed to install required module $($module.Name): $_"
                exit 1
              } else {
                Write-Host "⚠️ Optional module $($module.Name) installation failed: $_" -ForegroundColor Yellow
              }
            }
          }

      - name: "🔐 Configure Syncfusion"
        shell: pwsh
        run: |
          $hasLicense = "${{ needs.validate-environment.outputs.has-syncfusion-license }}" -eq "true"
          if ($hasLicense) {
            Write-Host "✅ Configuring Syncfusion license" -ForegroundColor Green
            Write-Output "SYNCFUSION_LICENSE_KEY=$env:SYNCFUSION_LICENSE_KEY" >> $env:GITHUB_ENV
          } else {
            Write-Host "⚠️ Building without Syncfusion license - features may be limited" -ForegroundColor Yellow
          }
        env:
          SYNCFUSION_LICENSE_KEY: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

      - name: "🏗️ Build Solution"
        id: build
        shell: pwsh
        run: |
          $solution = "${{ needs.validate-environment.outputs.solution-file }}"
          Write-Host "🏗️ Building solution: $solution" -ForegroundColor Cyan

          try {
            dotnet build $solution `
              --configuration ${{ env.BUILD_CONFIGURATION }} `
              --no-restore `
              --verbosity minimal `
              /p:TreatWarningsAsErrors=false `
              /p:WarningLevel=1 `
              /p:ContinuousIntegrationBuild=true
            
            Write-Host "✅ Build completed successfully" -ForegroundColor Green
          } catch {
            Write-Error "❌ Build failed: $_"
            exit 1
          }

      - name: "🧪 Run Tests"
        id: test
        shell: pwsh
        env:
          # Force in-memory database for ALL tests
          BUSBUDDY_CONNECTION: ""
          ConnectionStrings__DefaultConnection: "Data Source=:memory:"
          ConnectionStrings__TestConnection: "Data Source=:memory:"
          DatabaseProvider: "InMemory"
          ASPNETCORE_ENVIRONMENT: "Testing"
          DOTNET_ENVIRONMENT: "Testing"
        run: |
          $solution = "${{ needs.validate-environment.outputs.solution-file }}"
          $maxAttempts = 2

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "🧪 Test attempt $attempt of $maxAttempts" -ForegroundColor Cyan
            try {
              dotnet test `
                --timeout 900000 `
                --configuration ${{ env.BUILD_CONFIGURATION }} `
                --no-build `
                --verbosity normal `
                --logger "trx;LogFileName=test-results-$attempt.trx" `
                --collect "XPlat Code Coverage" `
                --results-directory ./TestResults `
                $solution
              
              Write-Host "✅ Tests completed successfully" -ForegroundColor Green
              break
            } catch {
              Write-Host "❌ Test attempt $attempt failed: $_" -ForegroundColor Red
              if ($attempt -eq $maxAttempts) {
                Write-Host "⚠️ Tests failed after $maxAttempts attempts, but continuing pipeline" -ForegroundColor Yellow
                # Don't fail the job - let artifacts upload
              } else {
                Start-Sleep -Seconds 10
              }
            }
          }

      - name: "📊 Upload Test Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            ./TestResults/**/*
            !./TestResults/**/*.tmp
          retention-days: 14

  # 📊 Quality analysis with configurable thresholds
  quality-analysis:
    name: "📊 Quality & Coverage"
    runs-on: ubuntu-latest
    needs: [validate-environment, build-and-test]
    timeout-minutes: 25
    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🏗️ Setup .NET"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "📊 Analyze Code Coverage"
        shell: pwsh
        continue-on-error: true
        run: |
          $solution = "${{ needs.validate-environment.outputs.solution-file }}"
          $threshold = [int]$env:COVERAGE_THRESHOLD

          Write-Host "📊 Running coverage analysis with $threshold% threshold" -ForegroundColor Cyan

          try {
            dotnet test $solution `
              --configuration ${{ env.BUILD_CONFIGURATION }} `
              --verbosity normal `
              --logger "trx;LogFileName=coverage-test-results.trx" `
              --collect:"XPlat Code Coverage" `
              --results-directory ./CoverageResults
            
            # Find and analyze coverage files
            $coverageFiles = Get-ChildItem -Recurse -Path "./CoverageResults" -Filter "coverage.cobertura.xml" -ErrorAction SilentlyContinue
            if ($coverageFiles) {
              $content = Get-Content $coverageFiles[0].FullName -Raw
              if ($content -match 'line-rate="([0-9.]+)"') {
                $coverage = [math]::Round([double]$matches[1] * 100, 2)
                Write-Host "📊 Code coverage: $coverage%" -ForegroundColor Green
                
                # Create coverage summary
                echo "## 📊 Code Coverage Report" >> $env:GITHUB_STEP_SUMMARY
                echo "" >> $env:GITHUB_STEP_SUMMARY
                echo "| Metric | Value |" >> $env:GITHUB_STEP_SUMMARY
                echo "|--------|-------|" >> $env:GITHUB_STEP_SUMMARY
                echo "| Coverage | $coverage% |" >> $env:GITHUB_STEP_SUMMARY
                echo "| Threshold | $threshold% |" >> $env:GITHUB_STEP_SUMMARY
                echo "| Status | $(if ($coverage -ge $threshold) { '✅ Pass' } else { '❌ Below Threshold' }) |" >> $env:GITHUB_STEP_SUMMARY
                
                if ($coverage -lt $threshold) {
                  Write-Host "⚠️ Coverage $coverage% is below threshold $threshold%" -ForegroundColor Yellow
                  Write-Host "::warning::Code coverage is below the configured threshold"
                  # Note: Not failing the pipeline - just warning
                } else {
                  Write-Host "✅ Coverage meets threshold" -ForegroundColor Green
                }
              }
            } else {
              Write-Host "⚠️ No coverage files found" -ForegroundColor Yellow
            }
          } catch {
            Write-Host "⚠️ Coverage analysis failed: $_" -ForegroundColor Yellow
          }

      - name: "🔍 Trunk Code Quality"
        continue-on-error: true
        run: |
          # Install trunk if not available
          if ! command -v trunk &> /dev/null; then
            echo "📦 Installing Trunk CLI..."
            curl https://get.trunk.io -fsSL | bash
          fi

          # Run trunk check with SARIF output
          trunk check --all --ci --output-format=sarif --output-file=trunk-results.sarif || {
            echo "⚠️ Trunk check completed with issues (continuing pipeline)"
          }

      - name: "📤 Upload SARIF Results"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trunk-results.sarif
          category: trunk-analysis

  # 🔒 Security analysis with proper permissions
  security-analysis:
    name: "🔒 Security Analysis"
    runs-on: ubuntu-latest
    needs: [validate-environment, validate-dependencies]
    timeout-minutes: 20
    # Only run on main repo with proper secrets
    if: ${{ !github.event.pull_request.head.repo.fork }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🏗️ Setup .NET"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "🔍 Initialize CodeQL"
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: "🏗️ Build for Analysis"
        shell: pwsh
        run: |
          $solution = "${{ needs.validate-environment.outputs.solution-file }}"
          try {
            dotnet restore $solution --verbosity minimal
            dotnet build $solution --no-restore --configuration Release --verbosity minimal
            Write-Host "✅ Security build completed" -ForegroundColor Green
          } catch {
            Write-Error "❌ Security build failed: $_"
            exit 1
          }

      - name: "🔍 Perform CodeQL Analysis"
        uses: github/codeql-action/analyze@v3
        with:
          output: sarif-results
          upload: true

  # 🚀 Deployment readiness with flexible branch support
  deployment-readiness:
    name: "🚀 Deployment Ready"
    runs-on: windows-latest
    needs: [validate-environment, build-and-test, quality-analysis]
    # Support multiple deployment branches
    if: ${{ contains(fromJSON('["refs/heads/main", "refs/heads/master", "refs/heads/develop"]'), github.ref) }}
    timeout-minutes: 15
    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🏗️ Setup .NET"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "📦 Create Release Build"
        shell: pwsh
        run: |
          $projectFile = "${{ needs.validate-environment.outputs.project-file }}"
          if ([string]::IsNullOrEmpty($projectFile)) {
            Write-Error "❌ No project file found for deployment"
            exit 1
          }

          Write-Host "🚀 Creating deployment package for: $projectFile" -ForegroundColor Cyan

          try {
            dotnet publish $projectFile `
              --configuration Release `
              --runtime win-x64 `
              --self-contained true `
              --output ./publish `
              /p:PublishSingleFile=true `
              /p:IncludeNativeLibrariesForSelfExtract=true `
              /p:PublishTrimmed=true
            
            Write-Host "✅ Deployment package created" -ForegroundColor Green
          } catch {
            Write-Error "❌ Deployment package creation failed: $_"
            exit 1
          }

      - name: "📤 Upload Deployment Package"
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package-${{ github.run_number }}
          path: |
            ./publish/**/*
            !./publish/**/*.pdb
          retention-days: 30

  # 📋 Pipeline summary with enhanced reporting
  pipeline-summary:
    name: "📋 Pipeline Summary"
    runs-on: ubuntu-latest
    needs:
      [
        validate-environment,
        build-and-test,
        quality-analysis,
        security-analysis,
        deployment-readiness,
      ]
    if: always()
    steps:
      - name: "📊 Generate Pipeline Report"
        shell: pwsh
        run: |
          echo "# 🚌 BusBuddy CI/CD Pipeline Report" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "## 📋 Execution Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "| Stage | Status | Duration |" >> $env:GITHUB_STEP_SUMMARY
          echo "|-------|--------|----------|" >> $env:GITHUB_STEP_SUMMARY
          echo "| Environment Validation | ${{ needs.validate-environment.result }} | N/A |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Build & Test | ${{ needs.build-and-test.result }} | N/A |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Quality Analysis | ${{ needs.quality-analysis.result }} | N/A |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Security Analysis | ${{ needs.security-analysis.result }} | N/A |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Deployment Ready | ${{ needs.deployment-readiness.result }} | N/A |" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "## 🔧 Configuration" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Solution**: ${{ needs.validate-environment.outputs.solution-file }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Project**: ${{ needs.validate-environment.outputs.project-file }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Syncfusion License**: ${{ needs.validate-environment.outputs.has-syncfusion-license }}" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Coverage Threshold**: ${{ env.COVERAGE_THRESHOLD }}%" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date)" >> $env:GITHUB_STEP_SUMMARY

      - name: "📧 Failure Notification"
        if: ${{ failure() }}
        shell: pwsh
        run: |
          Write-Host "❌ Pipeline failed - check the summary above for details" -ForegroundColor Red
          echo "::error::BusBuddy CI/CD Pipeline failed. Check individual job results for details."
