name: Auto-merge

# Solo-dev flow: open PR → CI gates pass → squash merge + delete branch (no human review required).
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.draft == false && github.event.pull_request.base.ref == 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Enable squash auto-merge when required checks pass
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            await github.rest.pulls.enableAutoMerge({
              owner,
              repo,
              pull_number,
              merge_method: 'squash',
            });
